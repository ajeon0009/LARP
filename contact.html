<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact LARP</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b0f1a, #111827);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #111827;
      padding: 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
      background: #1f2937;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #7c3aed, #6366f1);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .alt {
      text-align: center;
      margin-top: 20px;
    }

    a {
      color: #8b5cf6;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Get Your Free Website Preview</h1>
    <p>Fill this out and we’ll send you a custom website concept.</p>

    <form action="mailto:ajeon0009@gmail.com" method="POST" enctype="text/plain">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="text" name="business" placeholder="Business Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="What kind of website do you want?" rows="4"></textarea>
      <button type="submit">Request Free Preview</button>
    </form>
   <div class="alt">
  <p>Or message us directly on Instagram 👇</p>
  <a href="https://instagram.com/_ajeon0526" target="_blank">@_ajeon0526</a>
</div>
  </div>

</body>
</html>
